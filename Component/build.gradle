plugins {
    id 'com.android.library'
    id 'maven-publish'
}

android {
    compileSdkVersion 34

    defaultConfig {
        minSdkVersion 23
        targetSdkVersion 34
    }
}

afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                groupId = 'com.github.KOZENTech-Repo'
                artifactId = 'ComponentLib'
                version = '1.3.1'

                artifact("$projectDir/libs/ComponentLib_1.3.1_release.aar")
            }
        }
    }
}
