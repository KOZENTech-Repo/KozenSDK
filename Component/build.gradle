plugins {
    id 'com.android.library'
    id 'maven-publish'
}

android {
    namespace 'com.kozen.component'
    compileSdk 34

    defaultConfig {
        minSdk 23
        targetSdk 34
    }
}

afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                groupId = 'com.github.KOZENTech-Repo.KozenSDK'
                artifactId = 'ComponentLib'
                version = '1.3.1'

                artifact("$projectDir/libs/ComponentLib_1.3.1_release.aar")
            }
        }
    }
}
